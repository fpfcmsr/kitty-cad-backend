services:
  backend:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

